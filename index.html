<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOBOI - Intelligent Terminal</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=20260417c">
</head>
<body>
    <div class="terminal-container">
        <!-- Status Indicator -->
        <div id="wifiStatus" class="wifi-badge checking">
            Initializing System...
        </div>

        <div class="terminal-card">
            <header>
                <h1 id="liveClock">00:00:00</h1>
                <p onclick="hiddenLogin()" style="cursor: default;">Kola Borasi Indonesia</p>
            </header>

            <div class="cam-box">
                <video id="video" autoplay muted playsinline></video>
                <canvas id="canvas" style="display: none;"></canvas>
                <div class="scanner-line"></div>
            </div>

            <div class="input-box">
                <select id="namaSelect">
                    <option value="">-- Autodetect Required --</option>
                </select>

                <div class="btn-group">
                    <button id="btnMasuk" class="btn-m" onclick="prosesAbsen('MASUK')" disabled>
                        MASUK
                    </button>
                    <button id="btnPulang" class="btn-p" onclick="prosesAbsen('PULANG')" disabled>
                        PULANG
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- SDK & Logic -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js?v=20260417c"></script>
</body>
</html>
