<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Karyawan KOBOI</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        .portal-layout {
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            background: var(--dark-bg);
            padding: 20px;
        }
        .portal-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            display: none;
            flex-direction: column;
            animation: fadeIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .login-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 50px 30px;
            max-width: 400px;
            background: white;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1);
        }
        .login-section h2 { margin-bottom: 20px; color: var(--brand-text); }
        .login-section input {
            width: 100%; padding: 14px; border-radius: 12px;
            border: 2px solid #e2e8f0; margin-bottom: 16px;
            font-size: 1.1rem; text-align: center; color: var(--brand-text);
        }
        .login-section button {
            width: 100%; padding: 14px; border-radius: 12px;
            background: var(--brand-btn); color: var(--brand-text);
            font-weight: bold; border: none; cursor: pointer; font-size: 1.1rem;
        }
        .portal-header {
            background: linear-gradient(135deg, var(--brand-bg), #e63d00);
            padding: 40px; color: white;
            display: flex; justify-content: space-between; align-items: center;
        }
        .portal-header h1 { margin:0; font-size: 2rem; }
        .portal-body { padding: 40px; display: flex; gap: 30px; }
        .dashboard-stats { display: grid; gap: 20px; flex: 1; }
        .stat-card {
            background: #fff; padding: 25px; border-radius: 20px;
            border: 1px solid #e2e8f0; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
        }
        .stat-card h3 { font-size: 0.8rem; color: #64748b; text-transform: uppercase; margin-bottom: 10px; }
        .stat-card p { font-size: 2.5rem; font-weight: 800; color: var(--brand-text); margin: 0; }
        .history-section { flex: 2; }
        .history-section table { width: 100%; border-collapse: collapse; }
        .history-section th { background: #f8fafc; padding: 15px; text-align: left; }
        .history-section td { padding: 15px; border-bottom: 1px solid #f1f5f9; }
        .btn-logout { background: transparent; border: 1px solid white; color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        .btn-action { width: 100%; margin-top: 15px; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-action.secondary { background: #f1f5f9; color: #64748b; }
        .btn-action.primary { background: var(--brand-btn); color: var(--brand-text); }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 50; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; }
        .modal-content h3 { margin-bottom: 20px; color: var(--brand-text); }
        .modal-content select, .modal-content input, .modal-content textarea { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ccc; font-family: inherit; }
        .modal-content .btn-group { display: flex; gap: 10px; }
        .modal-content .btn-group button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="portal-layout" id="appLayout">
    <!-- Login Screen -->
    <div class="login-section" id="loginScreen">
        <h2>Login Karyawan</h2>
        <input type="text" id="loginNik" placeholder="Nomor ID Karyawan (Contoh: KBI-1234)">
        <input type="password" id="loginPin" placeholder="PIN (Default KBI: 123456)">
        <button onclick="loginKaryawan()">MASUK</button>
        <a href="index.html" style="margin-top:20px; color:#64748b; text-decoration:none;">Kembali ke Mesin Absen</a>
    </div>

    <!-- Dashboard Screen -->
    <div class="portal-card" id="dashboardScreen">
        <div class="portal-header">
            <div>
                <p style="opacity: 0.8; margin-bottom:5px; font-weight:600; letter-spacing:1px; text-transform:uppercase;">Selamat Datang,</p>
                <h1 id="userName">Nama Karyawan</h1>
                <p id="userDept" style="margin-top:5px; opacity:0.9;">Jabatan / Dept</p>
            </div>
            <div>
                <button class="btn-logout" onclick="logoutKaryawan()">KELUAR</button>
            </div>
        </div>
        
        <div class="portal-body">
            <div class="dashboard-stats">
                <div class="stat-card">
                    <h3>Sisa Cuti Tahunan</h3>
                    <p id="sisaCuti">0 <span style="font-size:1rem; color:#64748b; font-weight:600;">Hari</span></p>
                    <button class="btn-action secondary" onclick="bukaModal('modalCuti')">AJUKAN CUTI / IZIN</button>
                    <button class="btn-action secondary" onclick="bukaModal('modalKasbon')" style="margin-top:10px;">AJUKAN KASBON</button>
                </div>
                <div class="stat-card">
                    <h3>Gaji Bulan Ini (Estimasi)</h3>
                    <p id="estimasiGaji" style="font-size:1.8rem; color:#15803d;">Rp 0</p>
                    <button class="btn-action primary" onclick="downloadSlipPribadi()">DOWNLOAD SLIP GAJI</button>
                </div>
            </div>

            <div class="history-section">
                <h3 style="margin-bottom:20px; color:var(--brand-text);">Riwayat Absensi 7 Hari Terakhir</h3>
                <div style="background:white; border-radius:16px; border:1px solid #e2e8f0; overflow:hidden;">
                    <table>
                        <thead>
                            <tr>
                                <th>Tanggal & Waktu</th>
                                <th>Status</th>
                                <th>Telat</th>
                            </tr>
                        </thead>
                        <tbody id="historyTableBody">
                            <!-- Table rows injected by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal Ajukan Cuti -->
<div class="modal-overlay" id="modalCuti">
    <div class="modal-content">
        <h3>Pengajuan Cuti / Izin</h3>
        <select id="inpJenisCuti">
            <option value="CUTI">Cuti Tahunan</option>
            <option value="IZIN">Izin (Potong Gaji)</option>
            <option value="SAKIT">Sakit (Dengan Surat Dokter)</option>
        </select>
        <label style="font-size: 0.8rem; font-weight: bold; color: #64748b; margin-bottom: 5px; display: block;">TANGGAL MULAI</label>
        <input type="date" id="inpMulaiCuti">
        <label style="font-size: 0.8rem; font-weight: bold; color: #64748b; margin-bottom: 5px; display: block;">TANGGAL SELESAI</label>
        <input type="date" id="inpSelesaiCuti">
        <textarea id="inpAlasanCuti" placeholder="Alasan Pengajuan" rows="3"></textarea>
        <div class="btn-group">
            <button style="background: #e2e8f0; color: #64748b;" onclick="tutupModal('modalCuti')">BATAL</button>
            <button style="background: var(--brand-bg); color: white;" onclick="submitCuti()">AJUKAN</button>
        </div>
    </div>
</div>

<!-- Modal Ajukan Kasbon -->
<div class="modal-overlay" id="modalKasbon">
    <div class="modal-content">
        <h3>Pengajuan Kasbon (Pinjaman)</h3>
        <input type="number" id="inpNominalKasbon" placeholder="Nominal (Cth: 500000)">
        <textarea id="inpAlasanKasbon" placeholder="Alasan Keperluan Kasbon" rows="3"></textarea>
        <div class="btn-group">
            <button style="background: #e2e8f0; color: #64748b;" onclick="tutupModal('modalKasbon')">BATAL</button>
            <button style="background: var(--brand-bg); color: white;" onclick="submitKasbon()">AJUKAN</button>
        </div>
    </div>
</div>

<script src="portal.js"></script>
</body>
</html>
