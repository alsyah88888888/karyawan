<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOBOI - Admin Premium Dashboard</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
/* ADMIN DASHBOARD PREMIUM STYLES - INLINED FOR STABILITY */
:root {
  --primary: #4f46e5;
  --secondary: #818cf8;
  --dark: #0f172a;
  --light: #f8fafc;
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
  --sidebar-width: 280px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background-color: #f1f5f9;
  color: #1e293b;
  overflow-x: hidden;
}

/* SAFETY CATCH: Prevent Rogue Graphics from breaking the UI */
svg, img {
  max-width: 100%;
  height: auto;
}

.admin-wrapper { display: flex; min-height: 100vh; }

.sidebar {
  width: var(--sidebar-width);
  background: var(--dark);
  color: white;
  padding: 2rem 1.5rem;
  display: flex;
  flex-direction: column;
  position: fixed;
  height: 100vh;
  z-index: 100;
  transition: all 0.3s ease;
}

.sidebar h2 {
  font-size: 1.5rem;
  font-weight: 800;
  background: linear-gradient(to right, #818cf8, #c084fc);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 2rem;
  display: flex;
  align-items: center;
  gap: 10px;
}

.sidebar-nav { display: flex; flex-direction: column; gap: 0.5rem; flex-grow: 1; }

.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0.85rem 1rem;
  color: #94a3b8;
  text-decoration: none;
  border-radius: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  border: none;
  background: transparent;
  text-align: left;
  font-size: 0.95rem;
}

.nav-item:hover { color: white; background: #1e293b; }
.nav-item.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4); }

.sidebar-footer { margin-top: auto; display: flex; flex-direction: column; gap: 0.75rem; }

.btn-sidebar {
  width: 100%;
  padding: 0.75rem;
  border-radius: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
  text-align: center;
}

.btn-sidebar.logout { background: #334155; color: #f8fafc; }
.btn-sidebar.logout:hover { background: var(--danger); color: white; }

.main-content { flex: 1; margin-left: var(--sidebar-width); padding: 2rem; background: #f8fafc; }

.page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
.page-header h1 { font-size: 1.75rem; font-weight: 800; color: var(--dark); }

.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; margin-bottom: 2.5rem; }

.stat-card {
  background: white;
  padding: 1.5rem;
  border-radius: 1.25rem;
  box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
  display: flex;
  justify-content: space-between;
  align-items: center;
  border: 1px solid #f1f5f9;
}

.stat-info p { font-size: 0.875rem; color: #64748b; font-weight: 600; text-transform: uppercase; margin-bottom: 0.5rem; }
.stat-info h2 { font-size: 2rem; font-weight: 800; color: var(--dark); }

.stat-icon { width: 50px; height: 50px; border-radius: 1rem; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
.icon-blue { background: #e0e7ff; color: #4338ca; }
.icon-green { background: #dcfce7; color: #15803d; }
.icon-orange { background: #ffedd5; color: #9a3412; }

.table-container { background: white; border-radius: 1.25rem; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); overflow: hidden; border: 1px solid #f1f5f9; }
.table-header { padding: 1.5rem; background: white; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }
.table-header h3 { font-weight: 700; color: var(--dark); }

table { width: 100%; border-collapse: collapse; }
th { background: #f8fafc; padding: 1rem 1.5rem; text-align: left; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: #64748b; border-bottom: 1px solid #f1f5f9; }
td { padding: 1.25rem 1.5rem; font-size: 0.95rem; color: #334155; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
tr:hover { background: #f8fafc; }

.btn { padding: 0.6rem 1.25rem; border-radius: 0.75rem; font-weight: 600; font-size: 0.875rem; cursor: pointer; border: none; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: #4338ca; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); }
.btn-outline { background: white; border: 1.5px solid #e2e8f0; color: #64748b; }
.btn-outline:hover { background: #f8fafc; border-color: #cbd5e1; color: var(--dark); }

.tag { padding: 0.35rem 0.75rem; border-radius: 0.5rem; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
.tag-success { background: #dcfce7; color: #15803d; }
.tag-indigo { background: #e0e7ff; color: #4338ca; }
.tag-amber { background: #fef3c7; color: #92400e; }

.modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
.modal-content { background: white; border-radius: 1.5rem; width: 100%; max-width: 480px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); animation: slideUp 0.3s ease-out; }

@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.modal-header { padding: 1.5rem; background: var(--primary); color: white; display: flex; justify-content: space-between; align-items: center; }
.modal-header.orange { background: var(--warning); }
.modal-body { padding: 1.5rem; }
.form-group { margin-bottom: 1.25rem; }
.form-group label { display: block; font-size: 0.875rem; font-weight: 600; color: #64748b; margin-bottom: 0.5rem; }
.form-input { width: 100%; padding: 0.75rem; border-radius: 0.75rem; border: 2px solid #e2e8f0; outline: none; transition: all 0.2s; font-family: inherit; }
.form-input:focus { border-color: var(--primary); }

.mobile-top-bar { display: none; background: var(--dark); color: white; padding: 1rem; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 200; }
.menu-toggle { background: transparent; border: none; color: white; cursor: pointer; }
.close-sidebar { display: none; background: transparent; border: none; color: white; font-size: 2rem; cursor: pointer; }
.sidebar-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }

@media (max-width: 1024px) {
  :root { --sidebar-width: 80px; }
  .sidebar h2 span, .nav-item span, .btn-sidebar span { display: none; }
  .nav-item { justify-content: center; padding: 1.25rem; }
  .sidebar h2 { justify-content: center; }
}

@media (max-width: 768px) {
  :root { --sidebar-width: 280px; }
  .mobile-top-bar { display: flex; }
  .sidebar { left: -100%; transition: left 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
  .sidebar.active { left: 0; box-shadow: 20px 0 50px rgba(0, 0, 0, 0.5); }
  .close-sidebar { display: block; }
  .main-content { margin-left: 0; padding: 1.5rem 1rem; }
  .stat-grid { grid-template-columns: 1fr; }
  .page-header { flex-direction: column; align-items: flex-start; gap: 1rem; }
  .header-actions { width: 100%; }
  .header-actions .btn { width: 100%; justify-content: center; }
  .table-header { flex-direction: column; align-items: flex-start; gap: 15px; }
  .table-header select, .table-header .btn { width: 100%; }
  .modal-content { max-width: 95%; margin: 10px; }
}

.table-container { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table { min-width: 700px; }
    </style>
</head>
<body>
    <div class="admin-wrapper">
        <!-- MOBILE TOP BAR -->
        <div class="mobile-top-bar">
            <button class="menu-toggle" onclick="toggleSidebar()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <span class="mobile-logo">KOBOI ADMIN</span>
        </div>

        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                    <span>KOBOI ADMIN</span>
                </h2>
                <button class="close-sidebar" onclick="toggleSidebar()">
                    &times;
                </button>
            </div>
            
            <nav class="sidebar-nav">
                <button onclick="switchTab('log')" id="btnTabLog" class="nav-item active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                    <span>Log Absensi</span>
                </button>
                <button onclick="switchTab('karyawan')" id="btnTabKaryawan" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    <span>Kelola Karyawan</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <button class="btn-sidebar logout" onclick="window.location.href='index.html'">
                    <span>Kembali ke Terminal</span>
                </button>
                <button class="btn-sidebar" style="background: rgba(239, 68, 68, 0.1); color: #ef4444;" onclick="clearData()">
                    <span>Hapus Semua Log</span>
                </button>
            </div>
        </aside>

        <!-- MAIN -->
        <main class="main-content">
            <header class="page-header">
                <h1>Dashboard Overview</h1>
                <div class="header-actions">
                    <button class="btn btn-outline" onclick="exportData()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        Export CSV
                    </button>
                </div>
            </header>

            <!-- STAT GRID -->
            <div class="stat-grid">
                <div class="stat-card">
                    <div class="stat-info">
                        <p>Total Manpower</p>
                        <h2 id="statTotalKaryawan">0</h2>
                    </div>
                    <div class="stat-icon icon-blue">👥</div>
                </div>
                <div class="stat-card">
                    <div class="stat-info">
                        <p>Hadir Hari Ini</p>
                        <h2 id="statHadirHariIni">0</h2>
                    </div>
                    <div class="stat-icon icon-green">✅</div>
                </div>
                <div class="stat-card">
                    <div class="stat-info">
                        <p>Total Terlambat</p>
                        <h2 id="statTelatHariIni">0</h2>
                    </div>
                    <div class="stat-icon icon-orange">⏰</div>
                </div>
            </div>

            <!-- TAB: LOG ABSENSI -->
            <section id="tabLog">
                <div class="table-container">
                    <div class="table-header">
                        <h3>Log Presensi Real-time</h3>
                        <select id="filterDept" class="form-input" style="width: auto; padding: 8px 30px 8px 12px;" onchange="renderLogTable()">
                            <option value="ALL">Semua Departemen</option>
                            <option value="FINANCE">Finance</option>
                            <option value="OPERASIONAL">Operasional</option>
                        </select>
                    </div>
                    <div style="overflow-x: auto;">
                        <table>
                            <thead>
                                <tr>
                                    <th>KARYAWAN</th>
                                    <th>WAKTU</th>
                                    <th>STATUS</th>
                                    <th>FOTO</th>
                                    <th>AKSI</th>
                                </tr>
                            </thead>
                            <tbody id="logTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </section>

            <!-- TAB: KELOLA KARYAWAN -->
            <section id="tabKaryawan" style="display: none;">
                <div class="table-container">
                    <div class="table-header">
                        <h3>Database Karyawan & Payroll</h3>
                        <button class="btn btn-primary" onclick="showModal()">
                            <span>+ Tambah Karyawan</span>
                        </button>
                    </div>
                    <div style="overflow-x: auto;">
                        <table>
                            <thead>
                                <tr>
                                    <th>NAMA</th>
                                    <th>JABATAN</th>
                                    <th>REKENING</th>
                                    <th>GAJI POKOK</th>
                                    <th>THP (BULAN INI)</th>
                                    <th>AKSI</th>
                                </tr>
                            </thead>
                            <tbody id="karyawanTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- MODAL: TAMBAH KARYAWAN -->
    <div id="modalKaryawan" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <header class="modal-header">
                <h3>Tambah Karyawan</h3>
                <span style="cursor: pointer;" onclick="hideModal()">&times;</span>
            </header>
            <div class="modal-body">
                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <input type="text" id="inpNama" class="form-input" placeholder="Nama Karyawan...">
                </div>
                <div class="form-group">
                    <label>Departemen</label>
                    <select id="inpDept" class="form-input">
                        <option value="FINANCE">FINANCE</option>
                        <option value="OPERASIONAL">OPERASIONAL</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Nomor Rekening Bank</label>
                    <input type="text" id="inpRekening" class="form-input" placeholder="BCA - xxxxxxxx">
                </div>
                <div class="form-group">
                    <label>Gaji Pokok (Rp)</label>
                    <input type="number" id="inpGaji" class="form-input" placeholder="Contoh: 5000000">
                </div>
                <div style="display: flex; gap: 10px; margin-top: 2rem;">
                    <button class="btn btn-primary" style="flex: 1;" onclick="simpanKaryawan()">Simpan Data</button>
                    <button class="btn btn-outline" style="flex: 1;" onclick="hideModal()">Batal</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL: EDIT ABSENSI -->
    <div id="modalEditAbsen" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <header class="modal-header orange">
                <h3>Koreksi Presensi</h3>
                <span style="cursor: pointer;" onclick="hideEditModal()">&times;</span>
            </header>
            <div class="modal-body">
                <input type="hidden" id="editLogId">
                <div class="form-group">
                    <label>Nama Karyawan</label>
                    <input type="text" id="editNama" class="form-input" disabled style="background: #f1f5f9;">
                </div>
                <div class="form-group">
                    <label>Status Absensi</label>
                    <select id="editStatus" class="form-input">
                        <option value="MASUK">MASUK</option>
                        <option value="PULANG">PULANG</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Waktu Presensi</label>
                    <input type="datetime-local" id="editWaktu" class="form-input">
                </div>
                <div style="display: flex; gap: 10px; margin-top: 2rem;">
                    <button class="btn btn-primary" style="flex: 1; background: var(--warning);" onclick="simpanPerubahanAbsen()">Simpan Perubahan</button>
                    <button class="btn btn-outline" style="flex: 1;" onclick="hideEditModal()">Batal</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Supabase & Logic -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="admin.js"></script>
</body>
</html>
