<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- PWA / ADD TO HOME SCREEN ICONS -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="logokoboi.png">
    <link rel="apple-touch-icon" href="logokoboi.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="KOBOI Absen">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#4f46e5">

    <title>KOBOI - Intelligent Terminal</title>
    <!-- Google Fonts: Outfit for Modern Look -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=20260502_FINAL">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="terminal-container">
        <!-- Status Indicator -->
        <div id="wifiStatus" class="wifi-badge checking">
            Initializing System...
        </div>

        <div class="terminal-card">
            <header>
                <div class="logo-area">
                    <img src="logokoboi.png" alt="KOBOI Logo" id="terminalLogo">
                </div>
                <h1 id="liveClock">00:00:00</h1>
                <p id="liveDate"
                    style="font-size: 0.85rem; color: var(--text-muted); margin-top: -5px; margin-bottom: 15px; font-weight: 500;">
                </p>
                <p onclick="hiddenLogin()" style="cursor: default;">PT. KOLA BORASI INDONESIA</p>
            </header>

            <div class="cam-box">
                <video id="video" autoplay muted playsinline></video>
                <canvas id="canvas" style="display: none;"></canvas>
                <div class="scanner-line"></div>
            </div>

            <div class="input-box">
                <select id="namaSelect">
                    <option value="">-- Autodetect Required --</option>
                </select>

                <div class="btn-group">
                    <button id="btnMasuk" class="btn-m" onclick="prosesAbsen('MASUK')">
                        <i data-lucide="log-in"></i> <span>MASUK</span>
                    </button>
                    <button id="btnPulang" class="btn-p" onclick="prosesAbsen('PULANG')">
                        <i data-lucide="log-out"></i> <span>PULANG</span>
                    </button>
                </div>
                <div class="btn-group" style="margin-top: 10px;">
                    <button id="btnDinasMasuk" class="btn-d" onclick="prosesAbsen('DINAS LUAR')">
                        MASUK (DINAS LUAR)
                    </button>
                    <button id="btnDinasPulang" class="btn-d" onclick="prosesAbsen('PULANG DINAS')">
                        PULANG (DINAS LUAR)
                    </button>
                </div>

                <!-- TOMBOL MENU PORTAL KARYAWAN -->
                <div
                    style="margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; text-align: center;">
                    <a href="employee.html"
                        style="text-decoration: none; color: var(--text-muted); font-size: 0.85rem; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.3s;"
                        onmouseover="this.style.color='var(--primary)'"
                        onmouseout="this.style.color='var(--text-muted)'">
                        BUKA PORTAL KARYAWAN (CUTI & SLIP GAJI) →
                    </a>
                </div>
            </div>
        </div>
    </div>
    <!-- CUSTOM MODERN MODAL -->
    <div id="modalOverlay" class="modal-overlay">
        <div class="modal-box">
            <div id="modalIcon" class="modal-icon">!</div>
            <h3 id="modalTitle">Konfirmasi</h3>
            <p id="modalMessage">Silakan masukkan data yang diperlukan.</p>
            <div id="modalInputContainer" class="modal-input-container">
                <input type="password" id="modalInput" class="modal-input" placeholder="...">
            </div>
            <div class="modal-footer">
                <button id="modalCancelBtn" class="btn-cancel" onclick="closeModal()">Batal</button>
                <button id="modalConfirmBtn" class="btn-confirm">OK</button>
            </div>
        </div>
    </div>

    <!-- SUPABASE SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Main Logic -->
    <script src="script.js?v=20260502_FINAL"></script>

    <!-- PWA SERVICE WORKER & INSTALL LOGIC -->
    <script>
        let deferredPrompt;

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registered', reg))
                    .catch(err => console.error('Service Worker registration failed', err));
            });
        }

        // Handle Install Prompt
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            // Tampilkan tombol instal jika belum terinstal
            const installBtn = document.createElement('div');
            installBtn.id = 'pwaInstallBtn';
            installBtn.innerHTML = `
          <div style="position:fixed; bottom:20px; left:20px; right:20px; background:var(--primary); color:white; padding:15px; border-radius:15px; display:flex; align-items:center; justify-content:space-between; z-index:9999; box-shadow:0 10px 30px rgba(0,0,0,0.5); animation:slideUp 0.5s ease;">
            <div style="display:flex; align-items:center; gap:12px;">
              <img src="logokoboi.png" style="width:40px; height:40px; border-radius:10px;">
              <div>
                <div style="font-weight:800; font-size:0.9rem;">Instal Aplikasi KOBOI</div>
                <div style="font-size:0.7rem; opacity:0.8;">Akses lebih cepat & stabil</div>
              </div>
            </div>
            <button onclick="triggerPwaInstall()" style="background:white; color:var(--primary); border:none; padding:8px 15px; border-radius:10px; font-weight:800; font-size:0.8rem; cursor:pointer;">INSTAL</button>
          </div>
        `;
            document.body.appendChild(installBtn);
        });

        function triggerPwaInstall() {
            const btn = document.getElementById('pwaInstallBtn');
            if (btn) btn.remove();
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choiceResult) => {
                deferredPrompt = null;
            });
        }

        window.addEventListener('appinstalled', () => {
            const btn = document.getElementById('pwaInstallBtn');
            if (btn) btn.remove();
            console.log('PWA was installed');
        });
    </script>
</body>

</html>
