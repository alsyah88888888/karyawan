<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOBOI - Intelligent Terminal</title>
    <!-- Google Fonts: Outfit for Modern Look -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=20260417c">
</head>
<body>
    <div class="terminal-container">
        <!-- Status Indicator -->
        <div id="wifiStatus" class="wifi-badge checking">
            Initializing System...
        </div>

        <div class="terminal-card">
            <header>
                <div class="logo-area">
                    <img src="logokoboi.png" alt="KOBOI Logo" id="terminalLogo">
                </div>
                <h1 id="liveClock">00:00:00</h1>
                <p onclick="hiddenLogin()" style="cursor: default;">PT. KOLA BORASI INDONESIA</p>
            </header>

            <div class="cam-box">
                <video id="video" autoplay muted playsinline></video>
                <canvas id="canvas" style="display: none;"></canvas>
                <div class="scanner-line"></div>
            </div>

            <div class="input-box">
                <select id="namaSelect">
                    <option value="">-- Autodetect Required --</option>
                </select>

                <div class="btn-group">
                    <button id="btnMasuk" class="btn-m" onclick="prosesAbsen('MASUK')" disabled>
                        MASUK
                    </button>
                    <button id="btnPulang" class="btn-p" onclick="prosesAbsen('PULANG')" disabled>
                        PULANG
                    </button>
                </div>
                <div class="btn-group" style="margin-top: 10px;">
                    <button id="btnDinasMasuk" class="btn-d" onclick="prosesAbsen('DINAS LUAR')" style="background-color: #f59e0b; color: white; flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: all 0.3s ease;">
                        MASUK (DINAS LUAR)
                    </button>
                    <button id="btnDinasPulang" class="btn-d" onclick="prosesAbsen('PULANG DINAS')" style="background-color: #d97706; color: white; flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: all 0.3s ease;">
                        PULANG (DINAS LUAR)
                    </button>
                </div>
            </div>
        </div>
    </div>
    <!-- CUSTOM MODERN MODAL -->
    <div id="modalOverlay" class="modal-overlay">
        <div class="modal-box">
            <div id="modalIcon" class="modal-icon">!</div>
            <h3 id="modalTitle">Konfirmasi</h3>
            <p id="modalMessage">Silakan masukkan data yang diperlukan.</p>
            <div id="modalInputContainer" class="modal-input-container">
                <input type="password" id="modalInput" class="modal-input" placeholder="...">
            </div>
            <div class="modal-footer">
                <button id="modalCancelBtn" class="btn-cancel" onclick="closeModal()">Batal</button>
                <button id="modalConfirmBtn" class="btn-confirm">OK</button>
            </div>
        </div>
    </div>

    <!-- SDK & Logic -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js?v=20260417c"></script>
</body>
</html>
