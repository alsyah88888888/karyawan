<!doctype html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KOBOI - Terminal Karyawan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=3" />
  <link rel="manifest" href="manifest.json?v=3">
  <meta name="theme-color" content="#6366f1">
  <!-- Apple & Android PWA Support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="KOBOI">
  <link rel="apple-touch-icon" sizes="180x180" href="images/koboi.png">
  <link rel="icon" type="image/png" sizes="32x32" href="images/koboi.png">
  <link rel="icon" type="image/png" sizes="16x16" href="images/koboi.png">
</head>

<body>
  <div class="user-layout">
    <div id="wifiStatus" class="wifi-badge checking">
      Memverifikasi Koneksi...
    </div>

    <div class="terminal-card">
      <header>
        <h1 id="liveClock">00:00:00</h1>
        <p>Presensi Karyawan</p>
      </header>

      <div class="cam-box">
        <video id="video" autoplay muted playsinline></video>
        <canvas id="canvas" style="display: none"></canvas>
        <div class="scanner-line"></div>
      </div>

      <div class="input-box">
        <label for="namaSelect"
          style="display: block; font-weight: 700; margin-bottom: 8px; color: var(--brand-text); font-size: 0.9rem;">Pilih
          Nama Karyawan</label>
        <select id="namaSelect">
          <option value="">-- Nama Anda --</option>
        </select>

        <div class="btn-group">
          <button id="btnMasuk" class="btn-m" onclick="prosesAbsen('MASUK')" disabled>
            MASUK
          </button>
          <button id="btnPulang" class="btn-p" onclick="prosesAbsen('PULANG')" disabled>
            PULANG
          </button>
        </div>

        <div style="text-align: center; margin-top: 24px;">
          <a href="karyawan_portal.html" class="admin-link" style="text-decoration: none; font-size: 0.95rem;">Lihat Slip & Cuti (Portal Karyawan)</a>
        </div>

      </div>
    </div>

    <!-- System Access Hidden: Click clock 5 times -->
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="script.js?v=4"></script>
</body>

</html>
